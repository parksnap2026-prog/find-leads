<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Activity — WebPower</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; }
    .act-page { max-width: 1400px; margin: 0 auto; padding: 24px 20px 60px; }

    .act-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .act-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; }

    .act-tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; margin-bottom: 20px; width: fit-content; }
    .act-tab { padding: 8px 22px; border-radius: 7px; border: none; background: transparent; color: var(--muted); font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .act-tab.active { background: var(--accent); color: #fff; }
    .act-tab:hover:not(.active) { color: var(--text); }

    .act-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .act-filters input, .act-filters select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 7px 12px; border-radius: 8px; font-size: .875rem; outline: none; min-width: 160px;
    }
    .act-filters input:focus, .act-filters select:focus { border-color: var(--accent); }

    .act-stats { font-size: .8rem; color: var(--muted); margin-bottom: 12px; }

    .act-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table.act-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    table.act-table th {
      background: var(--surface2); color: var(--muted); font-weight: 600;
      padding: 10px 14px; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--border);
    }
    table.act-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.act-table tr:last-child td { border-bottom: none; }
    table.act-table tr:hover td { background: var(--surface); }

    .badge-real  { display: inline-block; background: rgba(99,102,241,.18); color: #818cf8; font-size: .72rem; font-weight: 700; border-radius: 20px; padding: 2px 8px; }
    .badge-test  { display: inline-block; background: rgba(245,158,11,.15); color: #f59e0b; font-size: .72rem; font-weight: 700; border-radius: 20px; padding: 2px 8px; }
    .badge-call  { display: inline-block; background: rgba(34,197,94,.15); color: #22c55e; font-size: .72rem; font-weight: 700; border-radius: 20px; padding: 2px 8px; }
    .badge-uncall { display: inline-block; background: rgba(148,163,184,.12); color: var(--muted); font-size: .72rem; font-weight: 700; border-radius: 20px; padding: 2px 8px; }

    .muted-cell { color: var(--muted); font-size: .78rem; }

    .empty-act { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-act svg { opacity: .35; margin-bottom: 12px; }

    .btn-dl {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 7px 14px; font-size: .82rem; font-weight: 600;
      text-decoration: none; cursor: pointer;
    }
    .btn-dl:hover { border-color: var(--accent); color: var(--accent); }

    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="https://webpower.blog" target="_blank" rel="noopener" class="logo" style="text-decoration:none">
      <img src="/static/logoWebPower.png" alt="WebPower" height="36" style="display:block;width:auto">
    </a>
    <a href="/" style="display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--accent);text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to search
    </a>
    <a href="/history" class="btn-icon" title="Search History" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </a>
    <a href="/templates" class="btn-icon" title="Edit Templates" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </a>
  </div>
</header>

<div class="act-page">
  <div class="act-header">
    <h1>Activity Log</h1>
    <div style="display:flex;gap:8px;">
      <a href="/api/export/email-log" class="btn-dl" id="dlEmails">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export emails CSV
      </a>
      <a href="/api/export/call-log" class="btn-dl" id="dlCalls" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export calls CSV
      </a>
    </div>
  </div>

  <div class="act-tabs">
    <button class="act-tab active" data-tab="emails">✉ Emails Sent</button>
    <button class="act-tab" data-tab="calls">📞 Calls Made</button>
  </div>

  <!-- Emails section -->
  <div class="section active" id="sec-emails">
    <div class="act-filters">
      <input type="text" id="efBiz"      placeholder="Business name…">
      <input type="text" id="efCity"     placeholder="City…">
      <input type="text" id="efTemplate" placeholder="Template…">
      <select id="efType">
        <option value="">All (real + test)</option>
        <option value="Real">Real only</option>
        <option value="Test">Test only</option>
      </select>
    </div>
    <div class="act-stats" id="emailStats"></div>
    <div class="act-table-wrap">
      <div class="empty-act" id="emailEmpty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <p>No emails sent yet</p>
      </div>
      <table class="act-table" id="emailTable" style="display:none">
        <thead>
          <tr>
            <th>Sent At</th>
            <th>Business</th>
            <th>Email Address</th>
            <th>Template</th>
            <th>City</th>
            <th>Country</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody id="emailBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Calls section -->
  <div class="section" id="sec-calls">
    <div class="act-filters">
      <input type="text" id="cfBiz"   placeholder="Business name…">
      <input type="text" id="cfCity"  placeholder="City…">
      <select id="cfAction">
        <option value="">All actions</option>
        <option value="Called">Called</option>
        <option value="Uncalled">Uncalled</option>
      </select>
    </div>
    <div class="act-stats" id="callStats"></div>
    <div class="act-table-wrap">
      <div class="empty-act" id="callEmpty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <p>No calls logged yet</p>
      </div>
      <table class="act-table" id="callTable" style="display:none">
        <thead>
          <tr>
            <th>Called At</th>
            <th>Action</th>
            <th>Business</th>
            <th>Phone</th>
            <th>City</th>
            <th>Country</th>
          </tr>
        </thead>
        <tbody id="callBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
(function() {
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let emailData = [], callData = [];

  // ── Tab switching ────────────────────────────────────────────────────────────
  const tabs = document.querySelectorAll('.act-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
      document.getElementById('dlEmails').style.display = tab.dataset.tab === 'emails' ? '' : 'none';
      document.getElementById('dlCalls').style.display  = tab.dataset.tab === 'calls'  ? '' : 'none';
    });
  });

  // ── Emails ───────────────────────────────────────────────────────────────────
  function filterEmails() {
    const qBiz  = document.getElementById('efBiz').value.trim().toLowerCase();
    const qCity = document.getElementById('efCity').value.trim().toLowerCase();
    const qTpl  = document.getElementById('efTemplate').value.trim().toLowerCase();
    const qType = document.getElementById('efType').value;
    return emailData.filter(r => {
      if (qBiz  && !(r['Business Name'] || '').toLowerCase().includes(qBiz))  return false;
      if (qCity && !(r['City'] || '').toLowerCase().includes(qCity))           return false;
      if (qTpl  && !(r['Template'] || '').toLowerCase().includes(qTpl))        return false;
      if (qType && r['Test/Real'] !== qType)                                   return false;
      return true;
    });
  }

  function renderEmails() {
    const rows = filterEmails();
    document.getElementById('emailStats').textContent =
      rows.length === emailData.length
        ? `${emailData.length} email${emailData.length !== 1 ? 's' : ''} sent`
        : `${rows.length} of ${emailData.length} emails`;

    if (!emailData.length) {
      document.getElementById('emailEmpty').style.display = 'block';
      document.getElementById('emailTable').style.display = 'none';
      return;
    }
    document.getElementById('emailEmpty').style.display = 'none';
    document.getElementById('emailTable').style.display = '';

    document.getElementById('emailBody').innerHTML = rows.map(r => {
      const isTest = r['Test/Real'] === 'Test';
      return `<tr>
        <td class="muted-cell">${esc(r['Sent At'] || '—')}</td>
        <td><strong>${esc(r['Business Name'] || '—')}</strong></td>
        <td>${esc(r['Email Address'] || '—')}</td>
        <td>${esc(r['Template'] || '—')}</td>
        <td>${esc(r['City'] || '—')}</td>
        <td>${esc(r['Country'] || '—')}</td>
        <td><span class="${isTest ? 'badge-test' : 'badge-real'}">${esc(r['Test/Real'] || '—')}</span></td>
      </tr>`;
    }).join('');
  }

  document.getElementById('efBiz').addEventListener('input', renderEmails);
  document.getElementById('efCity').addEventListener('input', renderEmails);
  document.getElementById('efTemplate').addEventListener('input', renderEmails);
  document.getElementById('efType').addEventListener('change', renderEmails);

  // ── Calls ────────────────────────────────────────────────────────────────────
  function filterCalls() {
    const qBiz    = document.getElementById('cfBiz').value.trim().toLowerCase();
    const qCity   = document.getElementById('cfCity').value.trim().toLowerCase();
    const qAction = document.getElementById('cfAction').value;
    return callData.filter(r => {
      if (qBiz    && !(r['Business Name'] || '').toLowerCase().includes(qBiz)) return false;
      if (qCity   && !(r['City'] || '').toLowerCase().includes(qCity))         return false;
      if (qAction && r['Action'] !== qAction)                                  return false;
      return true;
    });
  }

  function renderCalls() {
    const rows = filterCalls();
    document.getElementById('callStats').textContent =
      rows.length === callData.length
        ? `${callData.length} call${callData.length !== 1 ? 's' : ''} logged`
        : `${rows.length} of ${callData.length} calls`;

    if (!callData.length) {
      document.getElementById('callEmpty').style.display = 'block';
      document.getElementById('callTable').style.display = 'none';
      return;
    }
    document.getElementById('callEmpty').style.display = 'none';
    document.getElementById('callTable').style.display = '';

    document.getElementById('callBody').innerHTML = rows.map(r => {
      const isCalled = r['Action'] === 'Called';
      return `<tr>
        <td class="muted-cell">${esc(r['Called At'] || '—')}</td>
        <td><span class="${isCalled ? 'badge-call' : 'badge-uncall'}">${esc(r['Action'] || '—')}</span></td>
        <td><strong>${esc(r['Business Name'] || '—')}</strong></td>
        <td>${esc(r['Phone'] || '—')}</td>
        <td>${esc(r['City'] || '—')}</td>
        <td>${esc(r['Country'] || '—')}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('cfBiz').addEventListener('input', renderCalls);
  document.getElementById('cfCity').addEventListener('input', renderCalls);
  document.getElementById('cfAction').addEventListener('change', renderCalls);

  // ── Load data ────────────────────────────────────────────────────────────────
  document.getElementById('emailStats').textContent = 'Loading…';
  document.getElementById('callStats').textContent  = 'Loading…';

  Promise.all([
    fetch('/api/activity/emails').then(r => r.json()).catch(() => []),
    fetch('/api/activity/calls').then(r => r.json()).catch(() => []),
  ]).then(([emails, calls]) => {
    emailData = emails || [];
    callData  = calls  || [];
    renderEmails();
    renderCalls();
  });
})();
</script>
</body>
</html>
